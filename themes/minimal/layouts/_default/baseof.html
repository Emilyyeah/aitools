<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="/aitools/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/aitools/" class="site-logo">
        <span class="icon">AI</span>
        {{ .Site.Title }}
      </a>
      <nav class="main-nav">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL  | absLangURL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>{{ .Name }}</a>
        {{ end }}
      </nav>
    </div>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">{{ .Site.Title }}</div>
        <div class="footer-links">
          {{ range .Site.Menus.main }}
          <a href="{{ .URL | absLangURL }}">{{ .Name }}</a>
          {{ end }}
        </div>
      </div>
      <div class="footer-bottom">
        &copy; {{ now.Format "2006" }} {{ .Site.Title }} — 发现实用的AI工具与优惠
      </div>
    </div>
  </footer>
</body>
</html>
