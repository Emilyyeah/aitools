{{ define "main" }}
<div class="article-container">
  <a href="/aitools/" class="back-link">← 返回首页</a>
  <header class="article-header">
    <h1>{{ .Title }}</h1>
  </header>
  <div class="article-body">
    {{ range .Pages }}
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <p style="color:var(--c-text-light);font-size:.9rem">{{ .Description }}</p>
    <p style="margin-bottom:24px"><a href="{{ .RelPermalink }}">阅读 →</a></p>
    {{ end }}
  </div>
</div>
{{ end }}
