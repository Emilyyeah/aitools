{{ define "main" }}
  <h1>{{ .Title }}</h1>
  <div class="post-list">
    {{ range .Pages }}
    <article class="post-item">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ if .Date }}<time>{{ .Date.Format "2006-01-02" }}</time>{{ end }}
      <p>{{ .Summary }}</p>
    </article>
    {{ end }}
  </div>
{{ end }}
