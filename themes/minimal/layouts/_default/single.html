{{ define "main" }}
<div class="container">
  <header class="article-header">
    {{ with .Params.categories }}{{ range first 1 . }}<span class="category-tag">{{ . }}</span>{{ end }}{{ end }}
    <h1>{{ .Title }}</h1>
    <div class="article-meta">
      <span>📅 {{ .Date.Format "2006-01-02" }}</span>
      <span>⏱️ {{ .ReadingTime }} 分钟</span>
    </div>
  </header>
  <div class="article-body">
    {{ .Content }}
  </div>
</div>
{{ end }}
