{{ define "main" }}
<section class="hero">
  <div class="container">
    <h1>海外AI工具 · 国内使用指南</h1>
    <p class="subtitle">解决网络、注册、支付三层障碍。每个工具一份完整教程，不绕弯子。</p>
  </div>
</section>

<section class="container">
  <div class="tools-grid">
  {{ range .Site.Data.tools }}
    <a href="{{ .link }}" class="tool-card">
      <div class="tool-icon-wrap">{{ .icon }}</div>
      <div class="tool-info">
        <h3>{{ .name }}</h3>
        <p>{{ .desc }}</p>
      </div>
      {{ if .highlight }}<span class="tool-tag">{{ .highlight }}</span>{{ end }}
    </a>
  {{ end }}
  </div>
</section>
{{ end }}
