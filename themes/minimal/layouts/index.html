{{ define "main" }}
<section class="hero">
  <div class="container">
    <h1>海外AI工具 · 国内使用指南</h1>
    <p class="subtitle">选工具 → 选你的问题 → 看解决方案</p>
  </div>
</section>

<section class="container">
  <div class="tools-grid">
  {{ range .Site.Data.tools }}
    <details class="tool-details">
      <summary class="tool-summary">
        <span class="tool-icon-wrap">{{ .icon }}</span>
        <div class="tool-summary-text">
          <h3>{{ .name }}</h3>
          <p>{{ .desc }}</p>
        </div>
      </summary>
      <div class="tool-subitems">
        {{ range .items }}
        <a href="{{ .link }}" class="tool-subitem">{{ .q }}</a>
        {{ end }}
      </div>
    </details>
  {{ end }}
  </div>
</section>
{{ end }}
