{{ define "main" }}
<section class="hero">
  <div class="container">
    <h1>海外AI工具 · 国内使用指南</h1>
    <p class="subtitle">不用翻墙 · 不用海外信用卡 · 打开就能用</p>
  </div>
</section>

<section class="container">
  <div class="tools-grid">
  {{ range .Site.Data.tools }}
    <div class="tool-card">
      <div class="tool-header">
        <span class="tool-icon-wrap">{{ .icon }}</span>
        <div class="tool-header-text">
          <h3>{{ .name }}</h3>
          <p>{{ .desc }}</p>
        </div>
      </div>
      <div class="tool-subitems">
        {{ range .items }}
        <a href="{{ .url }}" class="tool-subitem"{{ if hasPrefix .url "http" }} target="_blank" rel="noopener"{{ end }}>{{ .text }}</a>
        {{ end }}
      </div>
    </div>
  {{ end }}
  </div>
</section>
{{ end }}
